{% extends "base.html" %}

{% block content %}
<section class="section relative pt-32">
    <div class="max-w-3xl mx-auto px-6">
        <a href="{% url 'portfolio:blog_list' %}" class="inline-flex items-center gap-2 text-white/40 hover:text-neon-cyan transition-colors mb-8 font-mono text-sm" style="cursor: none;">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
            Back to Blog
        </a>

        <article data-animate>
            {% if post.featured_image %}
            <div class="glass rounded-2xl overflow-hidden mb-8">
                <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" class="w-full h-auto">
            </div>
            {% endif %}

            <div class="flex items-center gap-3 mb-4">
                <span class="font-mono text-xs text-neon-cyan/60">{{ post.published_at|date:"F d, Y" }}</span>
                {% for tag in post.tags %}
                <span class="text-xs text-white/30 bg-white/5 px-2 py-0.5 rounded">{{ tag }}</span>
                {% endfor %}
            </div>

            <h1 class="font-display text-3xl md:text-4xl font-bold mb-8 gradient-text-static">{{ post.title }}</h1>

            <div class="prose prose-invert max-w-none text-white/60 leading-relaxed space-y-4">
                {{ post.content|linebreaks }}
            </div>
        </article>
    </div>
</section>
{% endblock %}
